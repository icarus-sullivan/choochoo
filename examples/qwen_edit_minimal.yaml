name: my_edit

model:
  type: qwen_edit
  pretrained_path: /path/to/qwen-image-edit

data:
  # Images with captions describing the desired edit style or instruction.
  #
  #   my-edits/
  #     image_001.png
  #     image_001.txt     ← "a portrait with dramatic lighting"
  #     image_002.png
  #     image_002.txt
  #
  # Or a metadata.jsonl: {"file_name": "image_001.png", "caption": "..."}
  data_dir: /path/to/images

lora:
  rank: 16
  alpha: 32

training:
  max_steps: 2000
  learning_rate: 1.0e-4
  save_every: 500

sample:
  sample_every: 500       # matches save_every — generate at each checkpoint
  steps: 20
  width: 512
  height: 512
  seed: 42
  prompts:
    - "a portrait with dramatic lighting"
    - "convert to a pencil sketch style"
